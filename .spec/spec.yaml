  "/journey/device/start":
    post:
      operationId: addDevice
      summary: Create Connect Secret
      description: Create Connect Secret
      tags:
        - Customer APIs
        - One Time Token Service
      security:
        - CustomerAccess: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceId:
                  type: string
                  minLength: 16
                  maxLength: 64
                  description:
                    Journey Instance Id, a unique identifier for a started
                    journey instance.
                scope:
                  type: array
                  items:
                    type: string
                    enum:
                      - mobile
                      - desktop
                      - "*"
                      - any
                      - ""
              required:
                - instanceId
                - scope
              additionalProperties: false
            example:
              instanceId: PiIuACmx8Q8R7qPnAkLAqBAT
              scope:
                - mobile
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  connectToken:
                    type: string
                    minLength: 8
                    maxLength: 1024
                    pattern: "^[A-Za-z0-9-_]+$"
                    description: Token used for subsequent operations by the client
                  tokenType:
                    type: string
                    enum:
                      - Bearer
                      - DPoP
                      - N_A
                      - connect
                    default: Bearer
                  expiresIn:
                    type: number
                    exclusiveMinimum: true
                    minimum: 0
                    description: Seconds until the token expires
                  scope:
                    type: array
                    items:
                      type: string
                      enum:
                        - mobile
                        - desktop
                        - "*"
                        - any
                        - ""
                    description: Scopes granted to the client
                required:
                  - connectToken
                  - expiresIn
                additionalProperties: false
              examples:
                Default:
                  value:
                    connectToken: s4FUx8Ny8ijXRtFigz3x1_8rb9bd_5ZD
                    tokenType: connect
                    expiresIn: 120
                    scope:
                      - any
        "201":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  connectToken:
                    type: string
                    minLength: 8
                    maxLength: 1024
                    pattern: "^[A-Za-z0-9-_]+$"
                    description: Token used for subsequent operations by the client
                  tokenType:
                    type: string
                    enum:
                      - Bearer
                      - DPoP
                      - N_A
                      - connect
                    default: Bearer
                  expiresIn:
                    type: number
                    exclusiveMinimum: true
                    minimum: 0
                    description: Seconds until the token expires
                  scope:
                    type: array
                    items:
                      type: string
                      enum:
                        - mobile
                        - desktop
                        - "*"
                        - any
                        - ""
                    description: Scopes granted to the client
                required:
                  - connectToken
                  - expiresIn
                additionalProperties: false
              examples:
                Default:
                  value:
                    connectToken: s4FUx8Ny8ijXRtFigz3x1_8rb9bd_5ZD
                    tokenType: connect
                    expiresIn: 120
                    scope:
                      - any
        "400":
          description: Bad Request
          content:
            application/json: {}
        "401":
          description: Unauthorized
          content:
            application/json: {}
        "403":
          description: Forbidden
          content:
            application/json: {}
        "404":
          description: Not Found
          content:
            application/json: {}
        "405":
          description: Method Not Allowed
          content:
            application/json: {}
        "500":
          description: Internal Server Error
          content:
            application/json: {}
        "503":
          description: Service Unavailable
          content:
