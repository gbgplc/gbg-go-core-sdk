                    type: string
                  type:
                    type: string
                  properties:
                    type: object
                    additionalProperties: {}
                  required:
                    type: array
                    items:
                      type: string
                required:
                  - "$schema"
                  - type
                  - properties
                  - required
                additionalProperties: false
              examples:
                Default:
                  value:
                    "$schema": http://json-schema.org/draft-07/schema#
                    type: object
                    properties:
                      context:
                        type: object
                        properties:
                          subject:
                            type: object
                            properties:
