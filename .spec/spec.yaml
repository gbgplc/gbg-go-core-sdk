---
openapi: 3.0.0
info:
  title: GBG GO Next Gen Flow Captain API
  version: 1.0.0
  description:
    API for Customers and End Users to interact with the GBG GO Next Gen
    Flow Captain
  contact:
    name: GBG GO Next Generation Flow Captain API Team
    url: https://gbgplc.com
    email: tbd@gbg.com
servers:
  - url: https://eu.platform.go.gbgplc.com/v2/captain
  - url: https://us.platform.go.gbgplc.com/v2/captain
  - url: https://au.platform.go.gbgplc.com/v2/captain
paths:
  /auth/realms/go/protocol/openid-connect/token:
    post:
      summary: Generate access token
      description: >-
        Get an access token to authenticate API requests. If you're unfamiliar
        with the authentication process, check out the [authentication
        guide](/docs/developer-integration/execute-customer-journeys/authenticate)
        for more details.
      security: []
      servers:
        - url: https://gbggo4-dev.nonprod.fabric.gbgplatforms.com
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: The client ID assigned to your organization.
                  example: your_client_id
                client_secret:
                  type: string
                  description: The client secret assigned to your organization.
                  example: your_client_secret
                username:
                  type: string
                  description: The username for API authentication.
                  example: your_username
                password:
                  type: string
                  description: The password for API authentication.
                  example: your_password
                grant_type:
                  type: string
                  enum:
                    - password
                  description: Must always be set to 'password'.
                  example: password
              required:
                - client_id
                - client_secret
                - username
                - password
                - grant_type
              example:
                client_id: your-client-id
                client_secret: your-client-secret
                username: api-user@example.com
                password: your-secure-password
                grant_type: password
      responses:
        "200":
          description: Successfully retrieved access token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: The access token used for authentication.
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  expires_in:
                    type: integer
                    description: Token expiration time in seconds.
                    example: 3600
                  token_type:
                    type: string
                    description: The type of token, usually 'Bearer'.
                    example: Bearer
        "400":
          description: Invalid request. Check your credentials.
        "401":
          description: Unauthorized request. Invalid username or password.
      x-speakeasy-group: tokens
      x-speakeasy-name-override: generate
  "/journey/health":
    get:
      operationId: health
      summary: Obtain the flow-captain health status
      description: Obtain the flow-captain health status
      tags:
        - Health
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
                additionalProperties: true
              example:
                message: OK
        "400":
          description: Bad Request
          content:
            application/json: {}
        "401":
          description: Unauthorized
          content:
            application/json: {}
        "403":
          description: Forbidden
          content:
            application/json: {}
        "404":
          description: Not Found
          content:
            application/json: {}
        "405":
          description: Method Not Allowed
          content:
            application/json: {}
        "500":
          description: Internal Server Error
          content:
            application/json: {}
        "503":
          description: Service Unavailable
          content:
            application/json: {}
  "/journey/device/connect":
    post:
      operationId: deviceConnect
      summary: Connect or Refresh End User Device
      description: Connect or Refresh End User Device
      tags:
        - End User APIs
        - One Time Token Service
      security:
        - DeviceConnect: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                connectToken:
                  type: string
                  minLength: 8
                  maxLength: 1024
                  pattern: "^[A-Za-z0-9-_]+$"
                  description: Bearer Token credential for a connection.
                deviceInfo:
                  type: object
                  properties:
                    deviceId:
                      type: string
                      minLength: 16
                      maxLength: 64
                      description: Device Id, a unique identifier for a device.
                    deviceName:
                      type: string
                    deviceType:
                      type: string
                  required:
                    - deviceId
                  additionalProperties: false
              required:
                - connectToken
                - deviceInfo
              additionalProperties: false
            example:
              deviceInfo:
                deviceId: exampleDeviceId123
                deviceName: deviceName
                deviceType: deviceType
              connectToken: s4FUx8Ny8ijXRtFigz3x1_8rb9bd_5ZD
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  endUserToken:
                    type: string
                    minLength: 8
                    maxLength: 1024
                    pattern: "^[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+$"
                    description: Token used for subsequent operations by the client
                  tokenType:
                    type: string
                    enum:
                      - Bearer
                      - DPoP
                      - N_A
                      - end-user
                    default: Bearer
                  expiresIn:
                    type: number
                    exclusiveMinimum: true
                    minimum: 0
                    description: Seconds until the token expires
                required:
                  - expiresIn
                additionalProperties: false
              examples:
                Default:
                  value:
                    endUserToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ8.eyJqdGkiOiJsRzlsZnZTVFVrcGNTTkVmSWx3amZXT1JRMkJwZEhGcCIsInNjb3BlIjpbImRlbW8zNCIsImF1dGgiXSwiaWF0IjoxNzEyMDc1OTMwLCJleHAiOjE3MTIwNzk1MzAsImF1ZCI6InVzLWVhc3QtMS5nYmdnby5jb20vI2RldmljZSJ9.Adn32WkNlhAlyFyHLH9EEVvFHk-FIhQn9Wiphb_BTRI
                    tokenType: end-user
                    expiresIn: 3600
        "201":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  endUserToken:
                    type: string
                    minLength: 8
                    maxLength: 1024
                    pattern: "^[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+\\.[A-Za-z0-9-_]+$"
                    description: Token used for subsequent operations by the client
                  tokenType:
                    type: string
                    enum:
                      - Bearer
                      - DPoP
                      - N_A
                      - end-user
                    default: Bearer
                  expiresIn:
                    type: number
                    exclusiveMinimum: true
                    minimum: 0
                    description: Seconds until the token expires
                required:
                  - expiresIn
                additionalProperties: false
              examples:
                Default:
                  value:
                    endUserToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ8.eyJqdGkiOiJsRzlsZnZTVFVrcGNTTkVmSWx3amZXT1JRMkJwZEhGcCIsInNjb3BlIjpbImRlbW8zNCIsImF1dGgiXSwiaWF0IjoxNzEyMDc1OTMwLCJleHAiOjE3MTIwNzk1MzAsImF1ZCI6InVzLWVhc3QtMS5nYmdnby5jb20vI2RldmljZSJ9.Adn32WkNlhAlyFyHLH9EEVvFHk-FIhQn9Wiphb_BTRI
                    tokenType: end-user
                    expiresIn: 3600
        "400":
          description: Bad Request
          content:
            application/json: {}
        "401":
          description: Unauthorized
          content:
            application/json: {}
        "403":
          description: Forbidden
          content:
            application/json: {}
        "404":
          description: Not Found
          content:
            application/json: {}
        "405":
          description: Method Not Allowed
          content:
            application/json: {}
        "500":
          description: Internal Server Error
          content:
            application/json: {}
        "503":
          description: Service Unavailable
          content:
            application/json: {}
  "/journey/task/list":
    post:
      operationId: getTasks
      summary: Get End User Tasks
      description: Get End User Tasks
      tags:
        - End User APIs
        - Task Service
      security:
        - PingID: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceId:
                  type: string
                  minLength: 16
                  maxLength: 64
                  description:
                    Journey Instance Id, a unique identifier for a started
                    journey instance.
              required:
                - instanceId
              additionalProperties: true
            example:
              instanceId: PiIuACmx8Q8R7qPnAkLAqBAT
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  instanceId:
                    type: string
                    minLength: 16
                    maxLength: 64
                    description:
                      Journey Instance Id, a unique identifier for a started
                      journey instance.
                  status:
                    type: string
                    enum:
                      - Completed
                      - InProgress
                      - Failed
                      - Paused
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        taskId:
                          type: string
                          minLength: 16
                          maxLength: 64
                          description:
                            Task Id, a unique identifier for a task assigned
                            to an End User during a Journey.
                      required:
                        - taskId
                      additionalProperties: false
                required:
                  - instanceId
                  - status
                  - tasks
                additionalProperties: false
              examples:
                Default:
                  value:
                    status: InProgress
                    instanceId: PiIuACmx8Q8R7qPnAkLAqBAT
                    tasks:
                      - taskId: TkoviRO58Q8R7qPnAkLAqBAT
        "400":
          description: Bad Request
          content:
            application/json: {}
        "401":
          description: Unauthorized
          content:
            application/json: {}
        "403":
          description: Forbidden
          content:
            application/json: {}
        "404":
          description: Not Found
          content:
            application/json: {}
        "405":
          description: Method Not Allowed
          content:
            application/json: {}
        "500":
          description: Internal Server Error
          content:
            application/json: {}
        "503":
          description: Service Unavailable
          content:
            application/json: {}
